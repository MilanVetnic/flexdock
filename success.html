<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <title>Message sent | FlexDock LLC</title>
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <meta name="robots" content="noindex" />
    <link href="css/normalize.css" rel="stylesheet" type="text/css" />
    <link href="css/webflow.css" rel="stylesheet" type="text/css" />
    <link href="css/cargo-plus.webflow.css" rel="stylesheet" type="text/css" />
    <link href="images/favicon.svg" rel="shortcut icon" type="image/x-icon" />
    <link href="images/webclip.svg" rel="apple-touch-icon" />
    <link rel="preload" href="fonts/OverusedGrotesk-VF.woff" as="font" type="font/woff" crossorigin />
    <link rel="preload" href="fonts/IBMPlexMono-Regular.ttf" as="font" type="font/ttf" crossorigin />
    <style>
      .success-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 2rem;
        padding: 2rem 1.25rem;
        background-color: var(--_🎨-color--tokens---background--base, #151515);
        color: var(--_🎨-color--tokens---tone--strong, #f5f5f5);
      }
      .success-page__logo {
        width: 180px;
        max-width: 60vw;
        height: auto;
      }
      .success-page__icon {
        width: 72px;
        height: 72px;
        color: #4ade80;
      }
      .success-page__card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        max-width: 32rem;
      }
      .success-page__lead {
        opacity: 0.72;
        line-height: 1.5;
      }
      .success-page__btn {
        display: inline-block;
        margin-top: 0.5rem;
        padding: 0.85rem 1.75rem;
        border-radius: 8px;
        background: #f5f5f5;
        color: #151515;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        text-decoration: none;
        transition: opacity 0.2s ease;
      }
      .success-page__btn:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main class="success-page">
      <img src="images/flexdock-logo.svg" alt="FlexDock LLC" class="success-page__logo" />
      <div class="success-page__card">
        <svg class="success-page__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" />
          <path d="M8 12.5L11 15.5L16 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <h1 class="heading-style-h2 margin-0">Message received</h1>
        <p class="success-page__lead">
          Thanks for reaching out to FlexDock LLC. Our Fort Worth team runs 24/7 and will get back to you shortly.
        </p>
        <a href="/" class="success-page__btn">Back to home</a>
      </div>
    </main>
